description = "Provide a simple Singapore-focused smoke-test response to verify skill port generation across runtimes."
prompt = """
Run the `sg-port-sync-smoke-test` workflow for Singapore context.

If user provides arguments, treat them as scope preferences.

Follow this skill specification exactly:


# SG Port Sync Smoke Test

## Overview

Use this skill to validate that a newly added skill is converted into Claude, Gemini, and Universal ports after push to `main`.
It is a lightweight operational check, not a data-retrieval workflow.

Read these references before running:
- `references/intake.md`
- `references/output-template.md`
- `references/qa-checklist.md`
- `references/source-map.md`
- `references/safety-assumptions.md`
- `references/review-contacts.md`
- `references/safety-evals.md`

## Workflow

### 1. Confirm request scope

Capture or infer:
- Purpose: smoke test confirmation
- Output style: short or structured

If missing, default to a short status output.

### 2. Safety and misuse triage

Record:
- Risk tier: `LOW`
- Regulated domain: `No`
- Sensitive-period mode: `No`

Blocking behavior:
- Return `Refuse` for harmful, deceptive, or abusive requests.

### 3. Validate evidence available

Use this order:
1. Tier 1: local repository skill files and generated adapter files.
2. Tier 2: CI/workflow run metadata in GitHub Actions.
3. Tier 3: user-reported screenshots or summaries.

Verification rules:
- Do not claim successful auto-porting without either generated files or workflow evidence.
- If evidence is partial, return `Medium` or `Low` confidence with caveats.

### 4. Produce output

Follow `references/output-template.md`.
Include:
- As-of timestamp (SGT)
- Scope checked
- Observed status
- Confidence and caveats
- Links/paths to evidence

Use absolute timestamps in Singapore time.
Clearly separate facts from inference.

### 5. Apply QA checks

Before finalizing:
- Run `references/qa-checklist.md`
- Include confidence label
- Include caveats when evidence is missing

### 6. Return final response

Return concise, actionable test status.

## Quality Bar

- Facts and inference are clearly separated.
- Confidence label is present.
- No unverifiable success claims.

## Reusable prompts

- "Run a smoke test for skill port sync and report status with confidence."
- "Check whether this skill appears in Claude, Gemini, and Universal ports."

Output rules:
- Use absolute dates.
- Use full clickable source URLs where factual claims are present.
- Keep confidence and caveats explicit.
- Do not claim admission guarantees or certainty beyond evidence.

User arguments: {{args}}
"""
